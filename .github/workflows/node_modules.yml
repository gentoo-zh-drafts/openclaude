# Auto-build the per-version node_modules bundle for app-misc/openclaude.
#
# The ebuild fetches its production node_modules from this repo's releases:
#   releases/download/v${PV}/openclaude-${PV}-node_modules.tar.gz
# This workflow watches the upstream Gitlawb/openclaude releases, and for a new
# version runs `npm install` and uploads the bundle here -- so autobump can then
# do the version bump once the bundle exists. It skips a version already built.
name: Sync with upstream (node_modules)

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "upstream tag, e.g. v0.24.0 (empty = latest release)"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: resolve upstream tag
        id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag }}"
          [ -n "$tag" ] || tag=$(gh release view --repo Gitlawb/openclaude --json tagName --jq .tagName)
          echo "tag=$tag"        >> "$GITHUB_OUTPUT"
          echo "pv=${tag#v}"     >> "$GITHUB_OUTPUT"

      - name: skip if this version's bundle already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.v.outputs.tag }}" --json assets --jq '.assets[].name' 2>/dev/null \
               | grep -qx "openclaude-${{ steps.v.outputs.pv }}-node_modules.tar.gz"; then
            echo "exists=1" >> "$GITHUB_OUTPUT"
            echo "bundle for ${{ steps.v.outputs.tag }} already built -- nothing to do"
          fi

      - name: checkout upstream at tag
        if: steps.check.outputs.exists != '1'
        uses: actions/checkout@v7
        with:
          repository: Gitlawb/openclaude
          ref: ${{ steps.v.outputs.tag }}
          path: input

      - name: setup node
        if: steps.check.outputs.exists != '1'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: build node_modules bundle
        if: steps.check.outputs.exists != '1'
        working-directory: input
        run: |
          npm install --legacy-peer-deps --cache "$PWD/npm-cache"
          # The ebuild sets S="${WORKDIR}/package" (the npm tarball's root) and installs with
          # `doins -r "${S}"/*`, so this bundle must unpack INTO package/ -- a bare node_modules/
          # root lands at ${WORKDIR}/node_modules, outside S, and never gets installed. Stage it
          # under package/ so the archive root is package/node_modules/...
          mkdir -p /tmp/stage/package
          mv node_modules /tmp/stage/package/
          tar --create --gzip --file "/tmp/openclaude-${{ steps.v.outputs.pv }}-node_modules.tar.gz" \
              -C /tmp/stage package
          # fail loudly if the layout regresses (must contain package/node_modules/)
          tar -tzf "/tmp/openclaude-${{ steps.v.outputs.pv }}-node_modules.tar.gz" \
              | grep -q '^package/node_modules/' || { echo "bundle missing package/node_modules/ prefix" >&2; exit 1; }

      - name: release bundle
        if: steps.check.outputs.exists != '1'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          files: /tmp/openclaude-${{ steps.v.outputs.pv }}-node_modules.tar.gz
